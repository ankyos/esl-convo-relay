<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Convo Relay — 会話リレー</title>
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>
  <div class="metal-bg"></div>

  <main class="frame" id="app">
    <header class="frame-header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">◎</span>
        <div>
          <h1>Convo Relay</h1>
          <p class="brand-sub">会話リレー · ESL Activity</p>
        </div>
      </div>
      <div class="session-badge" id="sessionBadge" hidden>
        <span class="badge-label">SESSION</span>
        <span class="badge-code" id="sessionCodeDisplay">——</span>
      </div>
    </header>

    <nav class="phase-progress" id="phaseProgress" hidden aria-label="Activity progress">
      <div class="phase-dots" id="phaseDots"></div>
    </nav>

    <section class="glass-panel" id="screen" aria-live="polite">
      <div class="screen-inner" id="staticFallback">
        <div class="phase-icon">👥</div>
        <h2 class="screen-title">Convo Relay</h2>
        <p class="screen-sub">読み込み中… Loading…</p>
      </div>
    </section>

    <footer class="frame-footer">
      <p class="hint" id="footerHint">グループ名を入力して参加</p>
    </footer>
  </main>

  <script type="module" src="js/app.js?v=2"></script>
  <script>
    window.addEventListener('error', function (e) {
      var el = document.getElementById('staticFallback');
      if (el && el.textContent.indexOf('Loading') !== -1) {
        el.innerHTML = '<div class="phase-icon">⚠</div><h2 class="screen-title">Load Error</h2>' +
          '<p class="screen-sub">JavaScript failed to load.<br>Try refreshing, or use Safari.</p>';
      }
    });
  </script>
</body>
</html>
