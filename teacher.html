<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Convo Relay — Teacher</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <div class="metal-bg"></div>

  <main class="frame" id="app">
    <header class="frame-header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">◎</span>
        <div>
          <h1>Convo Relay</h1>
          <p class="brand-sub">Teacher · 先生</p>
        </div>
      </div>
      <div class="session-badge" id="sessionBadge" hidden>
        <span class="badge-label">SESSION</span>
        <span class="badge-code" id="sessionCodeDisplay">——</span>
      </div>
    </header>

    <nav class="phase-progress" id="phaseProgress" hidden aria-label="Activity progress">
      <div class="phase-dots" id="phaseDots"></div>
    </nav>

    <section class="glass-panel" id="screen" aria-live="polite">
      <div class="screen-inner" id="staticFallback">
        <h2 class="screen-title">Convo Relay</h2>
        <p class="screen-sub">読み込み中… Loading…</p>
      </div>
    </section>

    <footer class="frame-footer">
      <p class="hint" id="footerHint">Teacher · 先生用</p>
    </footer>
  </main>

  <script>window.APP_VIEW = 'teacher';</script>
  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
